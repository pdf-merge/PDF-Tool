name: Compress PDF

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'PDF file name inside 1drive:LSC_Merged (e.g. MyBook.pdf)'
        required: true
        type: string
      quality:
        description: 'Compression quality (screen=72dpi | ebook=150dpi | printer=300dpi)'
        required: true
        type: choice
        default: 'ebook'
        options:
          - screen
          - ebook
          - printer

jobs:
  compress-pdf:
    runs-on: ubuntu-latest
    env:
      REMOTE_PATH: "1drive:LSC_Merged"

    steps:
      - name: 1. Install Dependencies
        run: |
          sudo apt-get update
          echo "Installing dependencies (rclone, ghostscript, exiftool)..."
          sudo apt-get install -y \
            rclone ghostscript exiftool

      - name: 2. Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: 3. Download PDF
        run: |
          mkdir -p workspace
          cd workspace

          echo "Downloading '${{ inputs.file_name }}' from $REMOTE_PATH..."
          rclone copy "$REMOTE_PATH/${{ inputs.file_name }}" .
          if [ $? -ne 0 ]; then echo "::error::Failed to download '${{ inputs.file_name }}' from $REMOTE_PATH"; exit 1; fi

          if [ ! -f "${{ inputs.file_name }}" ]; then
            echo "::error::File '${{ inputs.file_name }}' not found in $REMOTE_PATH"
            exit 1
          fi

          ORIGINAL_SIZE=$(du -sh "${{ inputs.file_name }}" | cut -f1)
          echo "Found: ${{ inputs.file_name }} ($ORIGINAL_SIZE)"

          echo "ORIGINAL_SIZE=$ORIGINAL_SIZE" >> $GITHUB_ENV

      - name: 4. Compress PDF with Ghostscript
        run: |
          cd workspace
          QUALITY="${{ inputs.quality }}"
          INPUT="${{ inputs.file_name }}"
          TEMP_FILE="compressed_$INPUT"

          echo "Compressing '$INPUT' with quality: $QUALITY..."

          gs \
            -sDEVICE=pdfwrite \
            -dCompatibilityLevel=1.4 \
            -dPDFSETTINGS=/$QUALITY \
            -dNOPAUSE \
            -dQUIET \
            -dBATCH \
            -sOutputFile="$TEMP_FILE" \
            "$INPUT"

          if [ $? -ne 0 ]; then
            echo "::error::Ghostscript compression failed"
            exit 1
          fi

          mv "$TEMP_FILE" "$INPUT"

          NEW_SIZE=$(du -sh "$INPUT" | cut -f1)
          echo "Compression complete. New size: $NEW_SIZE"
          echo "NEW_SIZE=$NEW_SIZE" >> $GITHUB_ENV

      - name: 5. Force PDF Metadata
        run: |
          cd workspace
          echo "Updating metadata for ${{ inputs.file_name }}..."
          exiftool -Title="LSC" \
                   -Author="LSC" \
                   -Subject="LSC" \
                   -Creator="LSC" \
                   -Producer="LSC" \
                   -overwrite_original \
                   "${{ inputs.file_name }}"
          echo "Metadata update complete."

      - name: 6. Upload Result (overwrite original)
        run: |
          cd workspace
          echo "Uploading '${{ inputs.file_name }}' back to $REMOTE_PATH (overwriting original)..."
          rclone copy "${{ inputs.file_name }}" "$REMOTE_PATH"
          if [ $? -ne 0 ]; then echo "::error::Failed to upload compressed PDF"; exit 1; fi
          echo "Upload complete."

      - name: 7. Create Artifact for Bot
        run: |
          cd workspace
          NEW_LINK=$(rclone link "$REMOTE_PATH/${{ inputs.file_name }}")
          BOOK_NAME=$(echo "${{ inputs.file_name }}" | sed 's/\.pdf$//' | tr '_' ' ')

          echo "✅ *Nén PDF Thành Công*\n\n" > artifact.txt
          echo "🆔 *Sách:* \`$BOOK_NAME\`\n" >> artifact.txt
          echo "📦 *Kích thước gốc:* ${{ env.ORIGINAL_SIZE }}\n" >> artifact.txt
          echo "📉 *Kích thước sau nén:* ${{ env.NEW_SIZE }}\n" >> artifact.txt
          echo "⚙️ *Chất lượng:* ${{ inputs.quality }}\n" >> artifact.txt
          echo "🔗 *Link Tải Mới:* [Nhấn vào đây]($NEW_LINK)" >> artifact.txt

      - name: 8. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-message
          path: workspace/artifact.txt
