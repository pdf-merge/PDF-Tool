name: Compress PDF

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'PDF file name inside 1drive:LSC_Merged (e.g. MyBook.pdf)'
        required: true
        type: string
      quality:
        description: 'Mức nén: Manh=file nhỏ nhất (96dpi) | TrungBinh=cân bằng (150dpi) | Vua=chất lượng cao (200dpi)'
        required: true
        type: choice
        default: 'TrungBinh'
        options:
          - Manh
          - TrungBinh
          - Vua
      re_ocr:
        description: 'OCR lại sau khi nén? (Có = giữ được copy chữ, lâu hơn)'
        required: true
        type: choice
        default: 'Co'
        options:
          - Co
          - Khong

jobs:
  compress-pdf:
    runs-on: ubuntu-latest
    env:
      SOURCE_PATH: "1drive:LSC_Merged"
      DEST_PATH: "1drive:LSC_Merged/Compress"

    steps:
      - name: 1. Install Dependencies
        run: |
          sudo apt-get update
          echo "Installing base dependencies..."
          sudo apt-get install -y rclone ghostscript exiftool

          if [ "${{ inputs.re_ocr }}" == "Co" ]; then
            echo "Installing OCR dependencies..."
            sudo apt-get install -y \
              python3-pip \
              tesseract-ocr tesseract-ocr-vie tesseract-ocr-eng \
              libopenjp2-7 ghostscript
            pip install ocrmypdf
          fi

      - name: 2. Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: 3. Download PDF
        run: |
          mkdir -p workspace
          cd workspace

          echo "Downloading '${{ inputs.file_name }}' from $SOURCE_PATH..."
          rclone copy "$SOURCE_PATH/${{ inputs.file_name }}" .
          if [ $? -ne 0 ]; then echo "::error::Failed to download '${{ inputs.file_name }}' from $SOURCE_PATH"; exit 1; fi

          if [ ! -f "${{ inputs.file_name }}" ]; then
            echo "::error::File '${{ inputs.file_name }}' not found in $SOURCE_PATH"
            exit 1
          fi

          ORIGINAL_SIZE=$(du -sh "${{ inputs.file_name }}" | cut -f1)
          echo "Found: ${{ inputs.file_name }} ($ORIGINAL_SIZE)"

          BASE_NAME=$(echo "${{ inputs.file_name }}" | sed 's/\.pdf$//')
          OUTPUT_FILE="${BASE_NAME}_Compress_${{ inputs.quality }}.pdf"

          echo "ORIGINAL_SIZE=$ORIGINAL_SIZE" >> $GITHUB_ENV
          echo "OUTPUT_FILE=$OUTPUT_FILE" >> $GITHUB_ENV

      - name: 4. Compress PDF with Ghostscript
        run: |
          cd workspace

          case "${{ inputs.quality }}" in
            Manh)      IMG_RES=96  ;;
            TrungBinh) IMG_RES=150 ;;
            Vua)       IMG_RES=200 ;;
          esac

          INPUT="${{ inputs.file_name }}"
          OUTPUT="${{ env.OUTPUT_FILE }}"

          echo "Compressing images to ${IMG_RES}dpi: '$INPUT' → '$OUTPUT'..."

          gs \
            -sDEVICE=pdfwrite \
            -dCompatibilityLevel=1.5 \
            -dNOPAUSE \
            -dQUIET \
            -dBATCH \
            -dDownsampleColorImages=true \
            -dColorImageDownsampleType=/Bicubic \
            -dColorImageResolution=$IMG_RES \
            -dDownsampleGrayImages=true \
            -dGrayImageDownsampleType=/Bicubic \
            -dGrayImageResolution=$IMG_RES \
            -dDownsampleMonoImages=true \
            -dMonoImageResolution=$IMG_RES \
            -dCompressFonts=true \
            -dSubsetFonts=true \
            -dEmbedAllFonts=true \
            -dDetectDuplicateImages=true \
            -sOutputFile="$OUTPUT" \
            "$INPUT"

          if [ $? -ne 0 ]; then
            echo "::error::Ghostscript compression failed"
            exit 1
          fi

          COMPRESSED_SIZE=$(du -sh "$OUTPUT" | cut -f1)
          echo "Ghostscript done. Size after compress: $COMPRESSED_SIZE"
          echo "COMPRESSED_SIZE=$COMPRESSED_SIZE" >> $GITHUB_ENV

      - name: 5. Re-OCR after Compression
        if: inputs.re_ocr == 'Co'
        run: |
          cd workspace
          OUTPUT="${{ env.OUTPUT_FILE }}"
          TEMP_OCR="ocr_$OUTPUT"

          echo "Running OCR on compressed file: '$OUTPUT'..."
          ocrmypdf \
            --language "vie+eng" \
            --force-ocr \
            --output-type pdf \
            "$OUTPUT" \
            "$TEMP_OCR"

          if [ $? -ne 0 ]; then
            echo "::error::OCRmyPDF failed"
            exit 1
          fi

          mv "$TEMP_OCR" "$OUTPUT"
          echo "OCR complete."

      - name: 6. Force PDF Metadata
        run: |
          cd workspace
          exiftool -Title="LSC" \
                   -Author="LSC" \
                   -Subject="LSC" \
                   -Creator="LSC" \
                   -Producer="LSC" \
                   -overwrite_original \
                   "${{ env.OUTPUT_FILE }}"

      - name: 7. Upload to LSC_Merged/Compress
        run: |
          cd workspace
          NEW_SIZE=$(du -sh "${{ env.OUTPUT_FILE }}" | cut -f1)
          echo "NEW_SIZE=$NEW_SIZE" >> $GITHUB_ENV

          echo "Uploading '${{ env.OUTPUT_FILE }}' to $DEST_PATH..."
          rclone copy "${{ env.OUTPUT_FILE }}" "$DEST_PATH"
          if [ $? -ne 0 ]; then echo "::error::Failed to upload compressed PDF"; exit 1; fi
          echo "Upload complete."

      - name: 8. Create Artifact for Bot
        run: |
          cd workspace
          NEW_LINK=$(rclone link "$DEST_PATH/${{ env.OUTPUT_FILE }}")
          BOOK_NAME=$(echo "${{ inputs.file_name }}" | sed 's/\.pdf$//' | tr '_' ' ')

          if [ "${{ inputs.re_ocr }}" == "Co" ]; then
            echo "✅ *Nén + OCR Thành Công*\n\n" > artifact.txt
          else
            echo "✅ *Nén PDF Thành Công*\n\n" > artifact.txt
          fi

          echo "🆔 *Sách:* \`$BOOK_NAME\`\n" >> artifact.txt
          echo "📦 *Kích thước gốc:* ${{ env.ORIGINAL_SIZE }}\n" >> artifact.txt
          echo "📉 *Sau nén (GS):* ${{ env.COMPRESSED_SIZE }}\n" >> artifact.txt
          echo "📄 *Kích thước cuối:* ${{ env.NEW_SIZE }}\n" >> artifact.txt
          echo "⚙️ *Mức nén:* ${{ inputs.quality }} | OCR lại: ${{ inputs.re_ocr }}\n" >> artifact.txt
          echo "🔗 *Link Tải:* [Nhấn vào đây]($NEW_LINK)" >> artifact.txt

      - name: 9. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-message
          path: workspace/artifact.txt
