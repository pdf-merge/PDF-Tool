name: OTA BUILD

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'International ROM to dump'
        required: true
        type: string
      source_file_2_path:
        description: 'Donor ROM for selected partitions; leave empty when not replacing'
        required: false
        type: string
      file_types:
        description: 'ODM or REGION,OPLUSTANVBK'
        required: false
        type: string
      fix_ai:
        description: 'Apply AI'
        required: false
        type: boolean
        default: false
      BUILD_SUPER:
        description: 'Build super.img from organized dynamic partitions'
        required: false
        type: boolean
        default: false
      UPLOAD_TARGETS:
        description: 'Select which directories to upload.'
        required: true
        type: choice
        options:
          - organized
          - repacked
          - both
        default: 'repacked'

env:
  TZ: Asia/Ho_Chi_Minh

jobs:
  extract-and-replace:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: Checkout FFF tool repository
        uses: actions/checkout@v4
        with:
          repository: 'proplayer1131/FFF_2026'
          token: ${{ secrets.ACTION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify tool files
        run: bash dump/scripts/ota_build_ci.sh verify-tools

      - name: Install dependencies
        env:
          BUILD_SUPER: ${{ github.event.inputs.BUILD_SUPER }}
        run: bash dump/scripts/ota_build_ci.sh install-dependencies

      - name: Configure rclone
        env:
          RCLONE_CONF_BASE64: ${{ secrets.RCLONE_CONF_BASE64 }}
        run: bash dump/scripts/ota_build_ci.sh configure-rclone

      - name: Get international base ROM
        id: get_rom
        env:
          FILE_PATH: ${{ github.event.inputs.file_path }}
        run: bash dump/scripts/ota_build_ci.sh get-base-rom

      - name: Get original donor ROM
        if: ${{ github.event.inputs.source_file_2_path != '' }}
        id: get_file_2
        env:
          FILE_PATH_2: ${{ github.event.inputs.source_file_2_path }}
        run: bash dump/scripts/ota_build_ci.sh get-donor-rom

      - name: Extract payload info
        id: payload_info
        run: bash dump/scripts/ota_build_ci.sh extract-payload-info

      - name: Resolve replacement plan
        id: replacement_plan
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          FILE_TYPES: ${{ github.event.inputs.file_types }}
          SOURCE_FILE_2_PATH: ${{ github.event.inputs.source_file_2_path }}
        run: bash dump/scripts/ota_build_ci.sh resolve-replacement-plan

      - name: Extract full international base ROM
        run: bash dump/scripts/ota_build_ci.sh extract-base-rom

      - name: Extract selected partitions from original donor ROM
        if: ${{ steps.replacement_plan.outputs.has_replacements == 'true' }}
        id: extract_file_2
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          FILE_TYPES: ${{ github.event.inputs.file_types }}
        run: bash dump/scripts/ota_build_ci.sh extract-donor-partitions

      - name: Replace base partitions with original ROM partitions
        id: copy_partitions
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          VERSION: ${{ steps.payload_info.outputs.version }}
          FILE_TYPES: ${{ github.event.inputs.file_types }}
        run: bash dump/scripts/ota_build_ci.sh copy-partitions

      - name: Resolve AI fix setting
        id: ai_fix_setting
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          VERSION: ${{ steps.payload_info.outputs.version }}
          FIX_AI_INPUT: ${{ github.event.inputs.fix_ai }}
        run: bash dump/scripts/ota_build_ci.sh resolve-ai-fix-setting

      - name: Apply AI my_region fix
        if: ${{ steps.ai_fix_setting.outputs.apply_ai_fix == 'true' }}
        id: fix_ai
        env:
          VERSION: ${{ steps.payload_info.outputs.version }}
          AI_FIX_REMOTE_DIR: "1drive1:Mirror/Oxygen/FileFix/AI"
        run: bash dump/scripts/ota_build_ci.sh apply-ai-fix

      - name: Show organized directory structure
        run: bash dump/scripts/ota_build_ci.sh show-organized

      - name: Build super image
        if: ${{ github.event.inputs.BUILD_SUPER == 'true' }}
        id: build_super
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          VERSION: ${{ steps.payload_info.outputs.version }}
        run: bash dump/scripts/ota_build_ci.sh build-super

      - name: Create final archive
        id: repack
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          VERSION: ${{ steps.payload_info.outputs.version }}
          REGION: ${{ steps.payload_info.outputs.region }}
          REPLACED_TYPES: ${{ steps.copy_partitions.outputs.file_types_replaced }}
          AI_FIX_REPLACED: ${{ steps.fix_ai.outputs.ai_fix_replaced }}
          SUPER_FILE: ${{ steps.build_super.outputs.super_file }}
        run: bash dump/scripts/ota_build_ci.sh repack

      - name: Set Upload Destination
        id: set_folder
        env:
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          VERSION: ${{ steps.payload_info.outputs.version }}
          REGION: ${{ steps.payload_info.outputs.region }}
          OUTPUT_FILE: ${{ steps.repack.outputs.output_file }}
        run: bash dump/scripts/ota_build_ci.sh set-upload-destination

      - name: Upload Dumps
        working-directory: ./dump
        env:
          RCLONE_DEST: "1drive1:Mirror/Oxygen"
          UPLOAD_TARGET: ${{ github.event.inputs.UPLOAD_TARGETS }}
          ARCHIVE_FILE: ${{ steps.repack.outputs.output_file }}
        run: |
          DEVICE_REMOTE_PATH="${RCLONE_DEST}/${UPLOAD_DEVICE_FOLDER}"
          FULL_REMOTE_PATH="$DEVICE_REMOTE_PATH"
          UPLOAD_REMOTE_LABEL="$UPLOAD_DEVICE_FOLDER"

          if [ -n "${UPLOAD_REGION:-}" ]; then
            REGION_DIRS="$(rclone lsf --dirs-only "$DEVICE_REMOTE_PATH" 2>/dev/null || true)"
            HAS_REGION_DIR=false
            MATCHED_REGION_DIR=""

            while IFS= read -r REGION_DIR; do
              REGION_DIR="${REGION_DIR%/}"
              if [ -z "$REGION_DIR" ]; then
                continue
              fi

              REGION_DIR_UPPER="${REGION_DIR^^}"
              case "$REGION_DIR_UPPER" in
                EU|GLB|IN|INDIA)
                  HAS_REGION_DIR=true
                  ;;
              esac

              case "$UPLOAD_REGION" in
                IN)
                  if [ "$REGION_DIR_UPPER" = "IN" ]; then
                    MATCHED_REGION_DIR="$REGION_DIR"
                  elif [ -z "$MATCHED_REGION_DIR" ] && [ "$REGION_DIR_UPPER" = "INDIA" ]; then
                    MATCHED_REGION_DIR="$REGION_DIR"
                  fi
                  ;;
                EU|GLB)
                  if [ "$REGION_DIR_UPPER" = "$UPLOAD_REGION" ]; then
                    MATCHED_REGION_DIR="$REGION_DIR"
                  fi
                  ;;
              esac
            done <<< "$REGION_DIRS"

            if [ -n "$MATCHED_REGION_DIR" ]; then
              FULL_REMOTE_PATH="${DEVICE_REMOTE_PATH}/${MATCHED_REGION_DIR}"
              UPLOAD_REMOTE_LABEL="${UPLOAD_DEVICE_FOLDER}/${MATCHED_REGION_DIR}"
            elif [ "$HAS_REGION_DIR" = true ]; then
              FULL_REMOTE_PATH="${DEVICE_REMOTE_PATH}/${UPLOAD_REGION}"
              UPLOAD_REMOTE_LABEL="${UPLOAD_DEVICE_FOLDER}/${UPLOAD_REGION}"
            fi
          fi

          echo "::add-mask::${RCLONE_DEST}"
          echo "::add-mask::${DEVICE_REMOTE_PATH}"
          echo "::add-mask::${FULL_REMOTE_PATH}"
          echo "Preparing upload"
          echo "Device folder: ${UPLOAD_DEVICE_FOLDER}"
          echo "Region folder: ${UPLOAD_REGION:-N/A}"
          echo "Remote path: ${FULL_REMOTE_PATH}"
          echo "Upload target: $UPLOAD_TARGET"
          rclone mkdir "$FULL_REMOTE_PATH"

          if [[ "$UPLOAD_TARGET" == "organized" ]]; then
            if [ -d "organized" ]; then
              rclone copy organized "${FULL_REMOTE_PATH}/organized" \
                --transfers=16 \
                --checkers=32 \
                --log-level NOTICE \
                --stats-one-line \
                --stats 30s \
                --progress
            else
              echo "::error::organized directory not found"
              exit 1
            fi
          elif [[ "$UPLOAD_TARGET" == "repacked" ]]; then
            if [ -f "$ARCHIVE_FILE" ]; then
              rclone copyto "$ARCHIVE_FILE" "${FULL_REMOTE_PATH}/$(basename "$ARCHIVE_FILE")" \
                --transfers=4 \
                --checkers=8 \
                --log-level NOTICE \
                --stats-one-line \
                --stats 30s \
                --progress
            else
              echo "::error::Archive file not found: $ARCHIVE_FILE"
              exit 1
            fi
          elif [[ "$UPLOAD_TARGET" == "both" ]]; then
            if [ -d "organized" ]; then
              rclone copy organized "${FULL_REMOTE_PATH}/organized" \
                --transfers=16 \
                --checkers=32 \
                --log-level NOTICE \
                --stats-one-line \
                --stats 30s \
                --progress
            fi
            if [ -f "$ARCHIVE_FILE" ]; then
              rclone copyto "$ARCHIVE_FILE" "${FULL_REMOTE_PATH}/$(basename "$ARCHIVE_FILE")" \
                --transfers=4 \
                --checkers=8 \
                --log-level NOTICE \
                --stats-one-line \
                --stats 30s \
                --progress
            fi
          else
            echo "::error::Unknown upload target: $UPLOAD_TARGET"
            exit 1
          fi

          echo "Upload completed. Verifying..."
          FILE_COUNT=$(rclone lsf --max-depth 2 "${FULL_REMOTE_PATH}" 2>/dev/null | wc -l || echo "0")

          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "Upload confirmed. Files: $FILE_COUNT"
            UPLOAD_SIZE=$(rclone size --json "${FULL_REMOTE_PATH}" 2>/dev/null | jq -r '.bytes' | awk '{ sum=$1 ; hum[1024**3]="GB";hum[1024**2]="MB";hum[1024]="KB"; for (x=1024**3; x>=1024; x/=1024){ if (sum>=x) { printf "%.2f %s\n",sum/x,hum[x];break } }}' || echo "N/A")
          else
            echo "::error::Upload verification found 0 files"
            exit 1
          fi

          echo "BOT_OUTPUT::Ten thu muc=${UPLOAD_REMOTE_LABEL}"
          echo "BOT_OUTPUT::Kich thuoc=${UPLOAD_SIZE:-N/A}"
          echo "Upload done: ${FULL_REMOTE_PATH}"

      - name: Create summary
        env:
          PRODUCT: ${{ steps.payload_info.outputs.product }}
          DEVICE_CODE: ${{ steps.payload_info.outputs.device_code }}
          VERSION: ${{ steps.payload_info.outputs.version }}
          FILE_TYPES_REPLACED: ${{ steps.copy_partitions.outputs.file_types_replaced }}
          AI_FIX_REPLACED: ${{ steps.fix_ai.outputs.ai_fix_replaced }}
          OUTPUT_FILE: ${{ steps.repack.outputs.output_file }}
          SUPER_FILE: ${{ steps.build_super.outputs.super_file }}
        run: bash dump/scripts/ota_build_ci.sh create-summary
